<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06111B"/>
      <stop offset="42%" stop-color="#09061A"/>
      <stop offset="75%" stop-color="#110819"/>
      <stop offset="100%" stop-color="#1B0A24"/>
    </linearGradient>

    <linearGradient id="sweepGrad" x1="1120" y1="320" x2="270" y2="610" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#36F0D3" stop-opacity="0.36"/>
      <stop offset="35%" stop-color="#2AD9D6" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#2AD9D6" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="ringGrad" x1="320" y1="230" x2="1190" y2="700" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2BE4D6" stop-opacity="0.68"/>
      <stop offset="50%" stop-color="#1B6E92" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#C15FFF" stop-opacity="0.24"/>
    </linearGradient>

    <radialGradient id="glowLeft" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(280 260) rotate(30) scale(420 520)">
      <stop offset="0%" stop-color="#21D7C6" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#21D7C6" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glowRight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1270 170) rotate(135) scale(470 650)">
      <stop offset="0%" stop-color="#C15FFF" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#C15FFF" stop-opacity="0"/>
    </radialGradient>

    <filter id="blurSoft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>

    <filter id="blurLarge" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="38"/>
    </filter>

    <pattern id="gridPattern" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" stroke="white" stroke-opacity="0.045"/>
    </pattern>

    <clipPath id="heroClip">
      <rect x="44" y="28" width="1512" height="788" rx="38"/>
    </clipPath>
  </defs>

  <rect width="1600" height="900" fill="#03040A"/>
  <rect x="44" y="28" width="1512" height="788" rx="38" fill="url(#bgGrad)" stroke="rgba(255,255,255,0.1)" stroke-opacity="0.4"/>

  <g clip-path="url(#heroClip)">
    <rect x="44" y="28" width="1512" height="788" fill="url(#glowLeft)"/>
    <rect x="44" y="28" width="1512" height="788" fill="url(#glowRight)"/>
    <rect x="44" y="28" width="1512" height="788" fill="url(#gridPattern)" opacity="0.35"/>

    <!-- Radar structure -->
    <g opacity="0.9">
      <circle cx="358" cy="406" r="126" stroke="url(#ringGrad)" stroke-width="2" stroke-opacity="0.24"/>
      <circle cx="358" cy="406" r="220" stroke="url(#ringGrad)" stroke-width="2" stroke-opacity="0.18"/>
      <circle cx="358" cy="406" r="326" stroke="url(#ringGrad)" stroke-width="2" stroke-opacity="0.14"/>
      <circle cx="358" cy="406" r="452" stroke="url(#ringGrad)" stroke-width="2.2" stroke-opacity="0.11"/>

      <path d="M358 406L806 178" stroke="url(#ringGrad)" stroke-width="1.6" stroke-opacity="0.18"/>
      <path d="M358 406L827 408" stroke="url(#ringGrad)" stroke-width="1.6" stroke-opacity="0.13"/>
      <path d="M358 406L741 662" stroke="url(#ringGrad)" stroke-width="1.6" stroke-opacity="0.13"/>
      <path d="M358 406L574 58" stroke="url(#ringGrad)" stroke-width="1.6" stroke-opacity="0.11"/>
    </g>

    <!-- Sweep -->
    <g>
      <path d="M358 406L910 160A610 610 0 0 1 941 415L358 406Z" fill="url(#sweepGrad)" filter="url(#blurSoft)"/>
      <path d="M358 406L866 183" stroke="#36F0D3" stroke-opacity="0.75" stroke-width="4.5" stroke-linecap="round"/>
      <circle cx="866" cy="183" r="10" fill="#36F0D3"/>
      <circle cx="866" cy="183" r="26" stroke="#36F0D3" stroke-opacity="0.22" stroke-width="2"/>
      <circle cx="697" cy="257" r="8" fill="#36F0D3" fill-opacity="0.78"/>
      <circle cx="697" cy="257" r="20" stroke="#36F0D3" stroke-opacity="0.18" stroke-width="2"/>
    </g>

    <!-- Additional radar targets -->
    <g>
      <circle cx="582" cy="586" r="6" fill="#36F0D3" fill-opacity="0.72"/>
      <circle cx="582" cy="586" r="16" stroke="#36F0D3" stroke-opacity="0.14" stroke-width="2"/>
      <circle cx="768" cy="404" r="5.5" fill="#36F0D3" fill-opacity="0.55"/>
      <circle cx="768" cy="404" r="14" stroke="#36F0D3" stroke-opacity="0.10" stroke-width="2"/>
      <circle cx="516" cy="140" r="5" fill="#C15FFF" fill-opacity="0.32"/>
      <circle cx="516" cy="140" r="16" stroke="#C15FFF" stroke-opacity="0.11" stroke-width="2"/>
    </g>

    <!-- Soft ambient lines -->
    <path d="M40 817C238 740 365 723 545 615C686 531 768 360 842 274" stroke="url(#ringGrad)" stroke-opacity="0.18" stroke-width="2" fill="none"/>
    <path d="M77 63C178 183 296 244 451 291" stroke="url(#ringGrad)" stroke-opacity="0.16" stroke-width="2" fill="none"/>

    <!-- Decorative glows -->
    <ellipse cx="372" cy="408" rx="90" ry="90" fill="#1CE8D7" fill-opacity="0.08" filter="url(#blurLarge)"/>
    <ellipse cx="1320" cy="188" rx="210" ry="280" fill="#C15FFF" fill-opacity="0.08" filter="url(#blurLarge)"/>
    <ellipse cx="184" cy="224" rx="170" ry="220" fill="#1CE8D7" fill-opacity="0.09" filter="url(#blurLarge)"/>
  </g>
</svg>
